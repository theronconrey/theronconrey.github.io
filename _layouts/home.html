---
layout: default
---

<div class="home">

  <!-- ============================================================
       Profile card
       Populated by the Mastodon API fetch below.
       Hidden by default; shown via JavaScript once data loads.
       ============================================================ -->
  <div id="profile-section" class="profile-section">
    <img id="profile-avatar" src="" alt="Profile photo" class="profile-avatar" />
    <h1 id="profile-name" class="profile-name"></h1>
    <p id="profile-bio" class="profile-bio"></p>
  </div>

  <!-- Shown if the Mastodon API call fails -->
  <div id="profile-error" class="profile-error">
    <p>Could not load profile.</p>
  </div>


  <!-- ============================================================
       Recent posts list
       ============================================================ -->
  {% if site.posts.size > 0 %}
    <h2 class="posts-heading">Recent Posts</h2>

    <ul class="post-list-clean">
      {% for post in site.posts limit:5 %}
        <li class="post-list-item">
          <span class="post-date">{{ post.date | date: "%b %-d, %Y" }}</span>
          <a href="{{ post.url | relative_url }}" class="post-title-link">{{ post.title | escape }}</a>
        </li>
      {% endfor %}
    </ul>
  {% endif %}

</div><!-- /.home -->


<!-- ============================================================
     Mastodon profile fetch
     Pulls display name, avatar, and bio from the Mastodon API
     and injects them into the profile card above.
     Falls back to showing the error div if anything goes wrong.
     ============================================================ -->
<script>
  (async function () {
    const instance = 'hachyderm.io';
    const username = 'theronconrey';
    const url = `https://${instance}/api/v1/accounts/lookup?acct=${username}`;

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('API error');
      const data = await res.json();

      // Populate profile card fields
      document.getElementById('profile-avatar').src = data.avatar || '';
      document.getElementById('profile-name').textContent = data.display_name || username;

      // Strip HTML tags from the bio (Mastodon returns HTML)
      const tmp = document.createElement('div');
      tmp.innerHTML = data.note || '';
      document.getElementById('profile-bio').textContent = tmp.textContent || tmp.innerText || '';

      // Reveal the card
      document.getElementById('profile-section').style.display = 'block';

    } catch (e) {
      // API unavailable or returned an error — show fallback message
      document.getElementById('profile-error').style.display = 'block';
    }
  })();
</script>
