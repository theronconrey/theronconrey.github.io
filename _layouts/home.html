---
layout: default
---

<div class="home">

  <div id="profile-section" style="text-align: center; padding: 3rem 1rem 2rem; display: none;">
    <img id="profile-avatar" src="" alt="Profile photo"
         style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 2px solid #333; margin-bottom: 1rem;" />
    <h1 id="profile-name" style="margin: 0.5rem 0 0.25rem; font-size: 1.6rem; color: #fff;"></h1>
    <p id="profile-bio" style="color: #ccc; max-width: 500px; margin: 0 auto 1rem; line-height: 1.6;"></p>
  </div>

  <div id="profile-error" style="display: none; text-align: center; padding: 2rem; color: #666;">
    <p>Could not load profile.</p>
  </div>

  {% if site.posts.size > 0 %}
    <h2 style="color: #aaa; font-size: 1rem; letter-spacing: 0.08em; text-transform: uppercase; margin: 2rem 0 0.75rem;">Recent Posts</h2>
    <ul style="list-style: none; margin: 0; padding: 0;">
      {% for post in site.posts limit:5 %}
        <li style="display: flex; align-items: baseline; gap: 1rem; padding: 0.4rem 0;">
          <span style="font-size: 1rem; font-weight: bold; color: #aaa; white-space: nowrap;">{{ post.date | date: "%b %-d, %Y" }}</span>
          <a href="{{ post.url | relative_url }}" style="font-size: 1rem; font-weight: normal; color: #fff; text-decoration: none;">{{ post.title | escape }}</a>
        </li>
      {% endfor %}
    </ul>
  {% endif %}

</div>
