<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Page title: "Post Title | Site Title" or just "Site Title" on the home page -->
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- RSS / Atom feed discovery -->
  <link type="application/atom+xml" rel="alternate"
        href="{{ '/feed.xml' | relative_url }}"
        title="{{ site.title }}">
</head>

<body>

  <!-- ============================================================
       Top navigation bar
       Left: site brand label
       Right: page links + social icons (Mastodon, RSS)
       ============================================================ -->
  <nav class="top-nav">

    <span class="nav-brand">48&deg; N</span>

    <div class="nav-right">

      <!-- Page links -->
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}">Home</a></li>
        <li><a href="{{ '/posts' | relative_url }}">Posts</a></li>
        <li><a href="{{ '/about' | relative_url }}">About</a></li>
      </ul>

      <!-- Social icons -->
      <div class="nav-social">

        <!-- Mastodon: @theronconrey@hachyderm.io -->
        <div class="nav-mastodon">
          <a href="https://hachyderm.io/@theronconrey" target="_blank" rel="noopener" title="Mastodon">
            <!-- Mastodon logo (official SVG) -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 74 79">
              <path d="M73.7 17.4C72.7 10.1 66.5 4.3 58.9 3c-1.2-.2-5.4-.8-15.5-.8h-.1c-10.1 0-12.3.6-13.5.8C22.3 4.3 15.8 9.7 14.3 17c-.7 3.6-.8 7.5-.5 11.1.4 5.6 1.5 11.1 4.5 16 3.8 6.1 9.6 9.9 16.3 11.1 6.8 1.2 13.9.7 20.3-1.6.6-.2 1.2-.5 1.8-.8.1 0 .2-.1.2-.1v-5.7s-.1 0-.2.1c-1.6.6-3.2 1.1-4.9 1.4-4.2.7-8.6.5-12.6-.9-5.7-2-6.5-7.5-6.6-8.6v-.3c2.2.5 4.4.9 6.6 1 2.3.1 4.6.2 6.9.1 4.4-.2 8.9-.7 13.1-2 .1 0 .2-.1.3-.1 6-1.8 11.7-6.8 12.3-15.2.1-.9.3-3 .3-3.9 0-.3.1-3.3 0-5.2zM61.4 37h-9.1V20.9c0-4.2-1.8-6.3-5.3-6.3-3.9 0-5.9 2.5-5.9 7.5v10.9h-9V22.1c0-5-2-7.5-5.9-7.5-3.5 0-5.3 2.1-5.3 6.3V37h-9.1v-16.6c0-4.2 1.1-7.5 3.2-10 2.2-2.5 5.1-3.7 8.7-3.7 4.2 0 7.3 1.6 9.4 4.8l2 3.4 2-3.4c2.1-3.2 5.2-4.8 9.4-4.8 3.6 0 6.5 1.3 8.7 3.7 2.1 2.5 3.2 5.8 3.2 10V37z"/>
            </svg>
          </a>
        </div>

        <!-- RSS feed -->
        <div class="nav-rss">
          <a href="{{ '/feed.xml' | relative_url }}" title="RSS Feed">
            <!-- RSS feed icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20
                       C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56
                       15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9
                       9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/>
            </svg>
          </a>
        </div>

      </div><!-- /.nav-social -->

    </div><!-- /.nav-right -->

  </nav><!-- /.top-nav -->


  <!-- ============================================================
       Main page content
       ============================================================ -->
  <main class="page-content" aria-label="Content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>



  <!-- ============================================================
       Footer
       Left: copyright
       Right: LinkedIn / resume link
       Center below: "built with" attribution
       ============================================================ -->
  <footer class="site-footer">
    <div class="wrapper">

      <!-- Single row: copyright (left) | attribution (center) | resume (right) -->
      <div class="footer-inner">

        <span class="footer-copyright">&#169; 2026 theron<strong>conrey</strong></span>


        <a href="https://www.linkedin.com/in/theronconrey"
           target="_blank" rel="noopener"
           class="footer-resume">Resume</a>

      </div><!-- /.footer-inner -->

    </div><!-- /.wrapper -->
  </footer><!-- /.site-footer -->

</body>
</html>
