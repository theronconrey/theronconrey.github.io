<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Page title: "Post Title | Site Title" or just "Site Title" on the home page -->
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <!-- RSS / Atom feed discovery -->
  <link type="application/atom+xml" rel="alternate"
        href="{{ '/feed.xml' | relative_url }}"
        title="{{ site.title }}">
</head>

<body>

  <!-- ============================================================
       Top navigation bar
       Left: site brand label
       Right: page links + social icons (Mastodon, RSS)
       ============================================================ -->
  <nav class="top-nav">

    <span class="nav-brand">48&deg; N</span>

    <div class="nav-right">

      <!-- Page links -->
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}">Home</a></li>
        <li><a href="{{ '/posts' | relative_url }}">Posts</a></li>
        <li><a href="{{ '/about' | relative_url }}">About</a></li>
      </ul>

      <!-- Social icons -->
      <div class="nav-social">

        <!-- Mastodon: @theronconrey@hachyderm.io -->
        <div class="nav-mastodon">
          <a href="https://hachyderm.io/@theronconrey" target="_blank" rel="noopener" title="Mastodon">
            <i class="fa-brands fa-mastodon"></i>
          </a>
        </div>

        <!-- LinkedIn -->
        <div class="nav-linkedin">
          <a href="https://www.linkedin.com/in/theronconrey" target="_blank" rel="noopener" title="LinkedIn">
            <i class="fa-brands fa-linkedin"></i>
          </a>
        </div>

        <!-- GitHub -->
        <div class="nav-github">
          <a href="https://github.com/theronconrey" target="_blank" rel="noopener" title="GitHub">
            <i class="fa-brands fa-github"></i>
          </a>
        </div>

        <!-- RSS feed -->
        <div class="nav-rss">
          <a href="{{ '/feed.xml' | relative_url }}" title="RSS Feed">
            <i class="fa-solid fa-rss"></i>
          </a>
        </div>

      </div><!-- /.nav-social -->

    </div><!-- /.nav-right -->

  </nav><!-- /.top-nav -->


  <!-- ============================================================
       Main page content
       ============================================================ -->
  <main class="page-content" aria-label="Content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>



  <!-- ============================================================
       Footer
       Left: copyright
       Right: LinkedIn / resume link
       Center below: "built with" attribution
       ============================================================ -->
  <footer class="site-footer">
    <div class="wrapper">

      <!-- Single row: copyright (left) | attribution (center) | resume (right) -->
      <div class="footer-inner">

        <span class="footer-copyright">&#169; 2026 theron<strong>conrey</strong></span>


        <a href="https://www.linkedin.com/in/theronconrey"
           target="_blank" rel="noopener"
           class="footer-resume">Resume</a>

      </div><!-- /.footer-inner -->

    </div><!-- /.wrapper -->
  </footer><!-- /.site-footer -->

</body>
</html>
